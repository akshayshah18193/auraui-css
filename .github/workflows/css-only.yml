name: CSS-only check

on:
  pull_request:
    paths:
      - 'aura-ui.css'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify aura-ui.css is pure CSS
        env:
          ACTOR: ${{ github.actor }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          if grep -nE '<script\b|</script>|javascript:' aura-ui.css; then
            echo "❌ JavaScript content detected in aura-ui.css"
            exit 1
          fi

          if grep -nE '<[[:alpha:]][^>]*>' aura-ui.css; then
            if [ "$ACTOR" != "$OWNER" ]; then
              echo "❌ HTML content detected in aura-ui.css (allowed only for repository owner)"
              exit 1
            fi
            echo "⚠️ HTML content detected, but allowed for repository owner ($OWNER)"
          fi

          echo "✅ aura-ui.css passed CSS-only checks"
